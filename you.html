<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Momentum — YOU</title>
  <link rel="icon" href="Assets/icons/favicon.svg" type="image/svg+xml" />

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/you.css">
</head>

<body class="you-body" data-momentum-page="you">
  <div data-momentum-navigation></div>

  <main class="you-page" data-nav-theme="dark">
    <section class="you-hero">
      <p class="section-kicker">Passeport personnel</p>
      <h1>YOU</h1>
    </section>

    <section class="you-layout">
      <aside class="you-overview-card">
        <a class="you-portrait" id="passportAvatar" href="you.html" aria-label="Ouvrir YOU"></a>

        <h2 id="passportName">—</h2>
        <p id="passportLocation" class="you-location">—</p>
        <p id="passportQuote" class="you-quote">—</p>

        <div class="you-mini-stats">
          <div>
            <span>Âge</span>
            <strong id="passportAge">—</strong>
          </div>
          <div>
            <span>Taille</span>
            <strong id="passportHeight">—</strong>
          </div>
          <div>
            <span>Poids</span>
            <strong id="passportWeight">—</strong>
          </div>
        </div>
      </aside>

      <section class="you-main">
        <div class="you-menu">
          <p class="you-menu-heading">Objectifs</p>
          <button class="you-menu-item active" data-you-section="mission" type="button">
            <span>Mon Horizon</span>
            <strong id="missionMenuTitle">Horizon non défini</strong>
          </button>

          <p class="you-menu-heading">Passeport</p>
          <button class="you-menu-item" data-you-section="sports" type="button">
            <span>Je vis pour</span>
            <strong id="sportsMenuSummary">Sports pratiqués</strong>
          </button>

          <button class="you-menu-item" data-you-section="wellbeing" type="button">
            <span>Mon équilibre</span>
            <strong id="wellbeingMenuSummary">État du corps</strong>
          </button>

          <button class="you-menu-item" data-you-section="equipment" type="button">
            <span>Mon matériel</span>
            <strong id="equipmentMenuSummary">Objets de route</strong>
          </button>

          <button class="you-menu-item" data-you-section="about" type="button">
            <span>Mon profil</span>
            <strong id="passportMenuName">—</strong>
          </button>

          <p class="you-menu-heading">Mon compte</p>
          <button class="you-menu-item" data-you-section="account" type="button">
            <span>Préférences & accès</span>
            <strong>Gérer mon compte</strong>
          </button>
        </div>

        <div id="youDetail" class="you-detail"></div>
      </section>
    </section>
  </main>

  <script src="js/navigation.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/momentum-ui.js"></script>
  <script src="js/guard.js"></script>

  <script src="js/you-passport.js"></script>
  <script src="js/avatar-cropper.js"></script>
  <script src="js/momentum-sports.js"></script>
  <script src="js/momentum-wellbeing.js"></script>
  <script src="js/momentum-icons.js"></script>
  <script src="js/momentum-empty-state.js"></script>
  <script src="js/you-sport-profile.js"></script>
  <script src="js/momentum-duration-picker.js"></script>
  <script src="js/you-mission.js"></script>
  <script src="js/you-sports.js"></script>
  <script src="js/you-wellbeing.js"></script>
  <script src="js/you-equipment.js"></script>

  <script src="js/you.js"></script>
</body>
</html>
