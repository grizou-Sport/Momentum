<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="css/style.css">

<body class="you-body">
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="mark">△</span><strong>Momentum</strong><em>v0.09</em>
    </a>

    <nav>
      <a href="index.html">HOME</a>
      <a class="active-nav" href="you.html">YOU</a>
      <a href="together.html">TOGETHER</a>
    </nav>

    <div class="top-actions">
      <button id="logoutBtn" class="topbar-logout you-logout" type="button">Déconnexion</button>
    </div>
  </header>

  <main class="you-page">
    <section class="you-hero">
      <p class="section-kicker">Passeport personnel</p>
      <h1>YOU</h1>
    </section>

    <section class="you-layout">
      <aside class="you-overview-card">
        <div class="you-portrait" id="passportAvatar"></div>

        <h2 id="passportName">—</h2>
        <p id="passportLocation" class="you-location">—</p>
        <p id="passportQuote" class="you-quote">—</p>

        <div class="you-mini-stats">
          <div>
            <span>Âge</span>
            <strong id="passportAge">—</strong>
          </div>
          <div>
            <span>Taille</span>
            <strong id="passportHeight">—</strong>
          </div>
          <div>
            <span>Poids</span>
            <strong id="passportWeight">—</strong>
          </div>
        </div>
      </aside>

      <section class="you-main">
        <div class="you-menu">
          <button class="you-menu-item active" data-you-section="mission" type="button">
            <span>Mon Horizon</span>
            <strong id="missionMenuTitle">Aucun horizon</strong>
          </button>

          <button class="you-menu-item" data-you-section="sports" type="button">
            <span>Je vis pour</span>
            <strong id="sportsMenuSummary">Sports pratiqués</strong>
          </button>

          <button class="you-menu-item" data-you-section="wellbeing" type="button">
            <span>Mon équilibre</span>
            <strong id="wellbeingMenuSummary">État du corps</strong>
          </button>

          <button class="you-menu-item" data-you-section="equipment" type="button">
            <span>Mon matériel</span>
            <strong id="equipmentMenuSummary">Objets de route</strong>
          </button>

          <button class="you-menu-item" data-you-section="about" type="button">
            <span>Passeport</span>
            <strong id="passportMenuName">—</strong>
          </button>
        </div>

        <div id="youDetail" class="you-detail"></div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/guard.js"></script>

  <script src="js/you-passport.js"></script>
